<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Settings</title>

<link rel="stylesheet"
href="styles.css">

</head>
<body>

<div class="settings-container">

<h1>Settings</h1>

<form id="settingsForm">

<div class="settings-card">

<h3>Profile Settings</h3>

<label for="fullname">
Full Name
</label>

<input
type="text"
id="fullname">

<label for="email">
Email
</label>

<input
type="email"
id="email">

</div>

<div class="settings-card">

<h3>Change Password</h3>

<label for="currentPassword">
Current Password
</label>

<input
type="password"
id="currentPassword"
autocomplete="current-password">

<label for="newPassword">
New Password
</label>

<input
type="password"
id="newPassword"
autocomplete="new-password">

<label for="confirmPassword">
Confirm Password
</label>

<input
type="password"
id="confirmPassword"
autocomplete="new-password">

</div>

<div class="settings-card">

<h3>Preferences</h3>

<label>

<input
type="checkbox"
id="darkMode">

Dark Mode

</label>

</div>

<button type="submit">
Save Changes
</button>

</form>

</div>

<script src="script.js"></script>

</body>
</html>
