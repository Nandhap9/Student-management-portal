<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Add Student</title>

<link rel="stylesheet"
href="styles.css">

</head>
<body>

<div class="form-container">

<h1>Add Student</h1>

<form id="studentForm">

<label for="name">
Student Name
</label>

<input
type="text"
id="name"
required>

<label for="roll">
Roll Number
</label>

<input
type="text"
id="roll"
required>

<label for="email">
Email
</label>

<input
type="email"
id="email"
required>

<label for="phone">
Phone Number
</label>

<input
type="tel"
id="phone"
required>

<label for="dept">
Department
</label>

<select id="dept" required>

<option value="">
Select Department
</option>

<option value="IT">
IT
</option>

<option value="CSE">
CSE
</option>

<option value="ECE">
ECE
</option>

<option value="EEE">
EEE
</option>

</select>

<label>
Gender
</label>

<div class="gender">

<label>

<input
type="radio"
name="gender"
value="Male"
required>

Male

</label>

<label>

<input
type="radio"
name="gender"
value="Female">

Female

</label>

</div>

<label for="address">
Address
</label>

<textarea
id="address"
rows="4">
</textarea>

<button type="submit">
Add Student
</button>

</form>

</div>

<script src="script.js"></script>

</body>
</html>
