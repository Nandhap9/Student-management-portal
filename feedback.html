<!DOCTYPE html>
<html>
<head>
<title>Feedback</title>
<link rel="stylesheet"
href="styles.css">
</head>

<body>

<div class="form-container">

<h1>Feedback</h1>

<form id="feedbackForm">

<input
type="text"
id="studentName"
placeholder="Student Name"
required>

<select id="rating">

<option>
Excellent
</option>

<option>
Good
</option>

<option>
Average
</option>

<option>
Poor
</option>

</select>

<textarea
id="feedback"
placeholder="Write feedback">
</textarea>

<button type="submit">
Submit Feedback
</button>

</form>

</div>

<script src="script.js"></script>

</body>
</html>
